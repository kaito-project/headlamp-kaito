name: Headlamp-kaito-plugin linting, type checking, testing, and build

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run custom lint (workaround for headlamp-plugin lint issue)
        run: npm run lint

      - name: Check code formatting
        run: npx @kinvolk/headlamp-plugin format --check .

      - name: Run type checking
        run: npx @kinvolk/headlamp-plugin tsc .

      - name: Run tests
        run: npx @kinvolk/headlamp-plugin test .

      - name: Build plugin
        run: npx @kinvolk/headlamp-plugin build .

      - name: Create Plugin Archive
        run: |
          mkdir -p headlamp-kaito-plugin
          cp package.json dist/* headlamp-kaito-plugin/
          cp -r public headlamp-kaito-plugin/ || true
          tar -czf ${{ github.event.repository.name }}-latest.tar.gz headlamp-kaito-plugin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: |
            dist/
            ${{ github.event.repository.name }}-latest.tar.gz
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-build

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Automated release of headlamp-kaito plugin
            
            ## Changes
            - Built from commit ${{ github.sha }}
            
            ## Installation
            Download the `headlamp-kaito-latest.tar.gz` file and install it in Headlamp.
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ github.event.repository.name }}-latest.tar.gz
          asset_name: headlamp-kaito-latest.tar.gz
          asset_content_type: application/gzip
